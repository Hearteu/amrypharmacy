# =============================================================
# Amry Pharmacy — Nginx Configuration
# =============================================================
# Include this inside your hearteu02.com server{} block via:
#   include /etc/nginx/snippets/pharmacy.conf;
# =============================================================

# ── Security Headers ─────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── NextAuth API routes — must go to Next.js, NOT Django ─────
location /pharmacy/api/auth/ {
    proxy_pass http://127.0.0.1:3001/pharmacy/api/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Login API — strict rate limit (anti brute-force) ─────────
location /pharmacy/api/login/ {
    limit_req zone=login burst=5 nodelay;
    proxy_pass http://127.0.0.1:8001/pharmacy/login/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Django API Backend — proxied to Gunicorn on port 8001 ────
location /pharmacy/api/ {
    limit_req zone=general burst=20 nodelay;
    proxy_pass http://127.0.0.1:8001/pharmacy/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 120s;
}

# ── Django Admin — proxied to Gunicorn on port 8001 ──────────
location /pharmacy/admin/ {
    limit_req zone=login burst=3 nodelay;
    proxy_pass http://127.0.0.1:8001/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Block public registration ────────────────────────────────
location /pharmacy/register {
    return 403;
}

# ── Django static files (collected via collectstatic) ────────
location /pharmacy/static/ {
    alias /home/ubuntu/amrypharmacy/backend/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# ── Next.js Frontend — proxied to Node on port 3001 ──────────
location /pharmacy {
    limit_req zone=general burst=30 nodelay;
    proxy_pass http://127.0.0.1:3001/pharmacy;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# ── Next.js public assets (images, favicons, etc.) ───────────
location /pharmacy/images/ {
    alias /home/ubuntu/amrypharmacy/frontend/public/images/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# ── Next.js static assets (_next directory) ──────────────────
location /pharmacy/_next/static/ {
    alias /home/ubuntu/amrypharmacy/frontend/.next/static/;
    expires 365d;
    add_header Cache-Control "public, immutable";
}
