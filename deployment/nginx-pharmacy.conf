# =============================================================
# Amry Pharmacy — Nginx Configuration
# =============================================================
# Add this inside your existing hearteu02.com server block,
# or include it via:  include /etc/nginx/conf.d/pharmacy.conf;
# =============================================================

# Django API Backend — proxied to Gunicorn on port 8001
# Handles all /pharmacy/ API routes (products, suppliers, pos, etc.)
location /pharmacy/api/ {
    proxy_pass http://127.0.0.1:8001/pharmacy/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 120s;
}

# Django Admin — proxied to Gunicorn on port 8001
location /pharmacy/admin/ {
    proxy_pass http://127.0.0.1:8001/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Django static files (collected via collectstatic)
location /pharmacy/static/ {
    alias /home/ubuntu/amrypharmacy/backend/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Next.js Frontend — proxied to Node on port 3001
location /pharmacy {
    proxy_pass http://127.0.0.1:3001/pharmacy;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# Next.js static assets (_next directory)
location /pharmacy/_next/static/ {
    alias /home/ubuntu/amrypharmacy/frontend/.next/static/;
    expires 365d;
    add_header Cache-Control "public, immutable";
}
