# =============================================================
# Rate Limiting Zones (must be in http context)
# Drop this file into /etc/nginx/conf.d/
# =============================================================

# General requests: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Login endpoint: 5 attempts/minute per IP (anti brute-force)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# API write operations: 20 requests/min per IP
limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/m;
